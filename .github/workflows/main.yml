name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer
        run: |
          pip install buildozer

      # ---------- 关键修复点 ----------
      - name: Accept SDK licenses
        run: |
          mkdir -p "$HOME/.android"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          # 如果上面命令报错找不到 sdkmanager，用兼容写法强行生成许可文件
          mkdir -p "$HOME/.android/licenses"
          echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" > "$HOME/.android/licenses/android-sdk-license"
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$HOME/.android/licenses/android-sdk-license"
      # --------------------------------

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-file
          path: bin/*.apk
