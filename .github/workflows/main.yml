name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk \
            autoconf automake libtool pkg-config cmake \
            libffi-dev libssl-dev zlib1g-dev \
            libjpeg-dev libpng-dev libncurses5-dev libncursesw5-dev

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer
        run: pip install buildozer

      - name: Remove pre-installed Android SDK
        run: |
          sudo rm -rf /usr/local/lib/android/sdk
          sudo rm -rf $HOME/.android

      - name: Build APK
        env:
          BUILDOZER_WITH_SUDO: 1
        run: |
          yes | buildozer -v android debug --force

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-file
          path: bin/*.apk