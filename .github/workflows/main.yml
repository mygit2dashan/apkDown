name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Docker
        uses: docker://kivy/buildozer:latest
        with:
          args: bash -c "yes | buildozer -v android debug --force"
        env:
          BUILDOZER_WITH_SUDO: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-file
          path: bin/*.apk