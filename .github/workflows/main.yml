name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Docker
        run: |
          docker run --rm \
            -v $(pwd):/home/user/hostcwd \
            -w /home/user/hostcwd \
            kivy/buildozer:latest \
            buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-file
          path: bin/*.apk
