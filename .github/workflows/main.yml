name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install buildozer & dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk
          pip install buildozer cython pillow

      - name: Setup Android SDK (auto-license)
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-33 build-tools;34.0.0"

      - name: Accept SDK licenses (double-check)
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anti-dedup-app
          path: bin/*.apk
