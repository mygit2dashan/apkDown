name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (including libtool fix)
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk \
            autoconf automake libtool libtool-bin pkg-config cmake \
            libffi-dev libssl-dev zlib1g-dev \
            libjpeg-dev libpng-dev libncurses5-dev libncursesw5-dev
          # 修复 libtool 宏路径，确保 autoreconf 能找到 LT_SYS_SYMBOL_USCORE
          sudo mkdir -p /usr/share/aclocal
          sudo cp /usr/share/libtool/build-aux/ltmain.sh /usr/share/aclocal/ 2>/dev/null || true
          sudo ln -sf /usr/bin/libtoolize /usr/bin/libtool
          echo "ACLOCAL_PATH=/usr/share/aclocal:/usr/share/libtool/build-aux" >> $GITHUB_ENV

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer
        run: pip install buildozer

      - name: Remove pre-installed Android SDK
        run: |
          sudo rm -rf /usr/local/lib/android/sdk
          sudo rm -rf $HOME/.android

      - name: Build APK
        env:
          BUILDOZER_WITH_SUDO: 1
        run: |
          yes | buildozer -v android debug --force

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-file
          path: bin/*.apk