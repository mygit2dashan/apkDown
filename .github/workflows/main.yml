name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-buildozer .

      - name: Build APK
        run: |
          docker run --rm \
            -v $(pwd):/app \
            -e BUILDOZER_WITH_SUDO=1 \
            my-buildozer \
            bash -c "yes | buildozer -v android debug --force"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-file
          path: bin/*.apk
